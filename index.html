<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Inventaris — Login</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Stylesheet utama -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ============================================================
     LOGIN SCREEN
============================================================ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">📦</div>
      <div class="login-brand-text">
        <div class="login-brand-name">INVENTARIS</div>
        <div class="login-brand-sub">Sistem Manajemen Aset</div>
      </div>
    </div>

    <h1 class="login-heading">Selamat datang</h1>
    <p class="login-sub">Masuk untuk melanjutkan ke sistem</p>

    <div class="login-error" id="login-error">
      ⚠️ Email atau password tidak sesuai. Coba lagi.
    </div>

    <div class="login-field">
      <label class="login-label">Email</label>
      <input class="login-input" type="email" id="login-email"
        placeholder="admin@inventaris.id" autocomplete="username" />
    </div>

    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" type="password" id="login-pass"
        placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="login-btn" onclick="doLogin()">Masuk ke Sistem →</button>

    <div class="login-hint">
      Demo credentials<br>
      <span>admin@inventaris.id</span> &nbsp;/&nbsp; <span>admin123</span>
    </div>
  </div>
</div>

<!-- ============================================================
     APP SCREEN
============================================================ -->
<div id="app-screen">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-title">INVENTARIS</div>
        <div class="brand-sub">Manajemen Aset</div>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">◀</button>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="nav-section-label">Utama</div>
      <button class="nav-btn active" data-page="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-btn" data-page="inventory">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Inventaris</span>
      </button>
      <button class="nav-btn" data-page="transactions">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Transaksi</span>
      </button>
      <button class="nav-btn" data-page="inventory_rooms">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Lokasi Barang</span>
      </button>

      <div class="nav-section-label">Referensi</div>
      <button class="nav-btn" data-page="buildings">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Gedung</span>
      </button>
      <button class="nav-btn" data-page="rooms">
        <span class="nav-icon">🚪</span>
        <span class="nav-label">Ruangan</span>
      </button>
      <button class="nav-btn" data-page="items">
        <span class="nav-icon">🏷️</span>
        <span class="nav-label">Master Barang</span>
      </button>
      <button class="nav-btn" data-page="item_types">
        <span class="nav-icon">📁</span>
        <span class="nav-label">Jenis Barang</span>
      </button>
      <button class="nav-btn" data-page="transaction_types">
        <span class="nav-icon">🔄</span>
        <span class="nav-label">Jenis Transaksi</span>
      </button>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Administrator</div>
        <div class="user-role">Super Admin</div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Keluar">⏻</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <div class="page-wrapper" id="page-container"></div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Modal</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast hidden" id="toast"></div>

</div><!-- /#app-screen -->

<!-- ============================================================
     JAVASCRIPT — urutan load penting!
     1. data      → DB tersedia global
     2. utils     → Utils tersedia global
     3. modal     → Modal tersedia global
     4. auth      → doLogin / doLogout
     5. pages/*   → Pages object dan semua halaman
     6. app       → App router (init terakhir)
============================================================ -->

<!-- Core -->
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/modal.js"></script>
<script src="js/auth.js"></script>

<!-- Pages (namespace Pages dibuat di dashboard.js) -->
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/inventory.js"></script>
<script src="js/pages/transactions.js"></script>
<script src="js/pages/inventory_rooms.js"></script>
<script src="js/pages/buildings.js"></script>
<script src="js/pages/rooms.js"></script>
<script src="js/pages/items.js"></script>
<script src="js/pages/item_types.js"></script>
<script src="js/pages/transaction_types.js"></script>

<!-- Router — harus paling akhir -->
<script src="js/app.js"></script>

</body>
</html>
